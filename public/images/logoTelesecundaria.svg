<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <!-- Background frame (dark border) -->
  <rect x="0" y="0" width="500" height="400" fill="#1c1c1c" rx="5"/>

  <!-- White inner background -->
  <rect x="14" y="14" width="472" height="372" fill="white"/>

  <!-- === LEFT SIDE: Green T === -->
  <!-- T horizontal bar (top) -->
  <rect x="20" y="20" width="290" height="95" fill="#6b9e28"/>
  <!-- T vertical stem -->
  <rect x="118" y="20" width="94" height="365" fill="#6b9e28"/>

  <!-- === RIGHT SIDE: Black S === -->
  <text
    x="486"
    y="388"
    font-family="'Arial Black', 'Helvetica Neue', Impact, sans-serif"
    font-size="390"
    font-weight="900"
    fill="#1c1c1c"
    text-anchor="end"
    dominant-baseline="auto"
  >S</text>

  <!-- === Hexagon network icon === -->
  <g>
    <line x1="195" y1="183" x2="257" y2="219" stroke="#1c1c1c" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="257" y1="219" x2="257" y2="291" stroke="#1c1c1c" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="257" y1="291" x2="195" y2="327" stroke="#1c1c1c" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="195" y1="327" x2="133" y2="291" stroke="#1c1c1c" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="133" y1="291" x2="133" y2="219" stroke="#1c1c1c" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="133" y1="219" x2="195" y2="183" stroke="#1c1c1c" stroke-width="5.5" stroke-linecap="round"/>
    <circle cx="195" cy="183" r="13" fill="#1c1c1c"/>
    <circle cx="257" cy="219" r="13" fill="#1c1c1c"/>
    <circle cx="257" cy="291" r="13" fill="#1c1c1c"/>
    <circle cx="195" cy="327" r="13" fill="#1c1c1c"/>
    <circle cx="133" cy="291" r="13" fill="#1c1c1c"/>
    <circle cx="133" cy="219" r="13" fill="#1c1c1c"/>
  </g>

  <!-- Outer border overlay -->
  <rect x="0" y="0" width="500" height="400" fill="none" stroke="#1c1c1c" stroke-width="28" rx="5"/>
</svg>
