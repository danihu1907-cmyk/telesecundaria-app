<div class="pantalla-split-auth">
  <div class="panel-formulario-derecho">
    <div class="contenedor-login">
      <img src="images/logo-telesecundaria.png" alt="Logo Telesecundaria" class="logo-movil" />

      <h1 class="titulo-pantalla">Inicia sesion con tu cuenta</h1>

      <div class="alerta error" *ngIf="mensajeErrorGlobal">{{ mensajeErrorGlobal }}</div>

      <form (ngSubmit)="ejecutarLogin()" #formularioLogin="ngForm">
        <div class="campo">
          <label>Correo electrónico <span class="requerido">*</span></label>
          <input
            type="email"
            name="correo"
            [(ngModel)]="datosLogin.correo"
            (input)="limpiarErrorCampo('correo')"
            placeholder="correo@gmail.com"
            required
            [class.input-error]="erroresCampos['correo']"
          />
          <span class="texto-error-campo" *ngIf="erroresCampos['correo']">{{
            erroresCampos['correo']
          }}</span>
        </div>

        <div class="campo">
          <label>Contraseña <span class="requerido">*</span></label>
          <input
            type="password"
            name="contrasena"
            [(ngModel)]="datosLogin.contrasena"
            (input)="limpiarErrorCampo('contrasena')"
            placeholder="Ingresa tu contraseña"
            required
            [class.input-error]="erroresCampos['contrasena']"
          />
          <span class="texto-error-campo" *ngIf="erroresCampos['contrasena']">{{
            erroresCampos['contrasena']
          }}</span>
        </div>

        <!-- ENLACE DE RECUPERAR CONTRASEÑA — USA CLASE CSS PARA EL COLOR VERDE -->
        <div class="enlace-recuperar">
          <a routerLink="/forgot-password" class="enlace-recuperar-link">
            ¿Olvidaste tu contraseña?
          </a>
        </div>

        <div class="bloque-botones-vertical">
          <button
            type="submit"
            class="btn-primario-grande"
            [disabled]="!datosLogin.correo || !datosLogin.contrasena || cargando()"
          >
            {{ cargando() ? 'Ingresando...' : 'Ingresar' }}
          </button>
        </div>
      </form>

      <div class="enlace-login-inferior">
        ¿No tienes cuenta?
        <strong routerLink="/register" style="cursor: pointer">Regístrate aquí</strong>
      </div>
    </div>
  </div>
  <div class="panel-marca-izquierdo">
    <div class="contenedor-logo-blanco">
      <img
        src="images/logo-telesecundaria.png"
        alt="Logo Telesecundaria"
        class="logo-institucional"
      />
    </div>
    <h1 class="titulo-marca">BIENVENIDO</h1>
    <p class="descripcion-marca">
      Inicia sesión para gestionar las inscripciones y consultar el estado del alumno.
    </p>
    <div class="chip-informativo">Control Escolar</div>
  </div>
</div>
