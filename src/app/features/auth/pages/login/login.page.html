<div class="pantalla-split-auth">
  <div class="panel-marca-izquierdo">
    <div class="contenedor-logo-blanco">
      <img
        src="images/logo-telesecundaria.png"
        alt="Logo Telesecundaria"
        class="logo-institucional"
      />
    </div>
    <h1 class="titulo-marca">BIENVENIDO</h1>
    <p class="descripcion-marca">
      Inicia sesión para gestionar las inscripciones y consultar el estado del alumno.
    </p>
    <div class="chip-informativo">Control Escolar</div>
  </div>

  <div class="panel-formulario-derecho">
    <div class="contenedor-login">
      <img src="images/logo-telesecundaria.png" alt="Logo Telesecundaria" class="logo-movil" />

      <h1 class="titulo-pantalla">INICIAR SESIÓN</h1>
      <p class="subtitulo-pasos">Ingresa tus credenciales de acceso</p>

      <form>
        <div class="campo">
          <label>Correo electrónico</label>
          <input type="email" placeholder="correo@gmail.com" />
        </div>

        <div class="campo">
          <label>Contraseña</label>
          <input type="password" placeholder="Ingresa tu contraseña" />
        </div>

        <div class="enlace-recuperar">
          <span (click)="irAForgotPassword()">¿Olvidaste tu contraseña?</span>
        </div>

        <div class="bloque-botones-vertical">
          <button type="submit" class="btn-primario-grande">Ingresar</button>
        </div>
      </form>

      <div class="enlace-login-inferior">
        ¿No tienes cuenta?
        <strong (click)="irARegistro()" style="cursor: pointer">Regístrate aquí</strong>
      </div>
    </div>
  </div>
</div>
