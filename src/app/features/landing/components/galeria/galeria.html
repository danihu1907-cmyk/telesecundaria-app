<section class="galeria">
  <div class="container">
    <h2 class="galeria__titulo">Galería</h2>

    <div class="galeria__grid">
      @for (imagen of imagenesGaleria(); track imagen.claveGaleria) {
        <div class="galeria__item">
          <img [src]="imagen.rutaImagenUrl" [alt]="imagen.tituloEvento" />
        </div>
      }
    </div>

    <div class="galeria__footer"></div>
  </div>
</section>
